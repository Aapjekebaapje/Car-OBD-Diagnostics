<div id="confirm-overlay" class="confirm-overlay" hidden>
    <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <p class="eyebrow">{{ i18n.partials.confirm.eyebrow }}</p>
        <h2 id="confirm-title">{{ i18n.partials.confirm.title }}</h2>
        <p id="confirm-message">{{ i18n.partials.confirm.message }}</p>
        <div class="confirm-actions">
            <button id="confirm-no-button" class="secondary-action" type="button">{{ i18n.partials.confirm.no }}</button>
            <button id="confirm-yes-button" class="danger-action" type="button">{{ i18n.partials.confirm.yes }}</button>
        </div>
    </div>
</div>
