<section class="page-screen page-history" data-page="history">
    <article class="panel">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">{{ i18n.history.eyebrow }}</p>
                <h2>{{ i18n.history.title }}</h2>
            </div>
        </div>
        <div id="scan-history" class="history-list"></div>
    </article>
    <article class="panel history-detail-panel">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">{{ i18n.history.detail_eyebrow }}</p>
                <h2>{{ i18n.history.detail_title }}</h2>
            </div>
        </div>
        <div id="scan-history-detail" class="history-detail-empty">{{ i18n.history.detail_empty }}</div>
    </article>
</section>
