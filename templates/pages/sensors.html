<section class="page-screen page-sensors" data-page="sensors">
    <div class="system-layout sensor-support-layout">
        <article class="panel">
            <div class="panel-heading">
                <div>
                    <p class="eyebrow">{{ i18n.sensors.supported_eyebrow }}</p>
                    <h2>{{ i18n.sensors.supported_title }}</h2>
                </div>
            </div>
            <div id="supported-sensors" class="sensor-support-list"></div>
        </article>

        <article class="panel">
            <div class="panel-heading">
                <div>
                    <p class="eyebrow">{{ i18n.sensors.unsupported_eyebrow }}</p>
                    <h2>{{ i18n.sensors.unsupported_title }}</h2>
                </div>
            </div>
            <div id="unsupported-sensors" class="sensor-support-list"></div>
        </article>
    </div>
</section>
