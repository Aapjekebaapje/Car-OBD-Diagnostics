<section class="page-screen page-report" data-page="report">
    <div class="report-layout">
        <article class="panel">
            <div class="panel-heading">
                <div>
                    <p class="eyebrow">{{ i18n.report.eyebrow }}</p>
                    <h2 id="report-headline">{{ i18n.report.title }}</h2>
                </div>
            </div>
            <div id="report-summary" class="history-list"></div>
        </article>

        <article class="panel">
            <div class="panel-heading">
                <div>
                    <p class="eyebrow">{{ i18n.report.readiness_eyebrow }}</p>
                    <h2>{{ i18n.report.readiness_title }}</h2>
                </div>
            </div>
            <div id="readiness-grid" class="sensor-support-list"></div>
        </article>
    </div>

    <article class="panel">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">{{ i18n.report.details_eyebrow }}</p>
                <h2>{{ i18n.report.details_title }}</h2>
            </div>
        </div>
        <div id="report-sections" class="history-list"></div>
    </article>
</section>
